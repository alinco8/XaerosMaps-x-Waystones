xmxw:
  toast:
    modded_waypoint_set_not_editable: "MOD-managed waypoint sets cannot be edited! Changing the selected waypoint set may fix this."
    modded_waypoint_not_editable: "MOD-managed waypoints cannot be edited! Changing the selected waypoint set may fix this."
    update_available: "New version %s is available! You are using version %s"
    all_sets_disabled: "Render All Waypoint Sets option of Xaero's Minimap is disabled! Waypoints may not render correctly."
  config:
    title: "XMXW Config"
    categories:
      waypoint:
        name: "Waypoint"
        groups:
          offset:
            name: "Offset"
            options:
              x:
                name: "X"
                description: "Set the X offset for the waypoint display."
              y:
                name: "Y"
                description: "Set the Y offset for the waypoint display."
              z:
                name: "Z"
                description: "Set the Z offset for the waypoint display."
          colorCandidates:
            name: "Color Candidates"
            options:
              _color:
                description: "Use %s as a candidate for random colors."
        options:
          title:
            name: "Title"
            description:
              0: "Set the title displayed on waypoints. placeholders:"
              1: "  %s: the waypoint name"
              2: "  %s: the first letter of the waypoint name"
          nameFormat:
            name: "Name Format"
            description: "Select the format for waypoint names."
          color:
            name: "Color"
            description: "Choose the color of the waypoint."
          visibility:
            name: "Visibility"
            description: "Set the visibility of the waypoint."
          warnOnAllSetsDisabled:
            name: "Warn on Render All Waypoint Sets Disabled"
            description: "Show a warning when Render All Waypoint Sets is disabled."
      worldData:
        name: "World Data"
        groups:
          _waystonePoint:
            options:
              hide:
                name: "Hide"
                description: "Hide the waystone point."

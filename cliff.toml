[changelog]
#language=twig
body = """
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | striptags | trim | upper_first }}
    {% for commit in commits %}
        - {% if commit.scope and commit.scope != "release" %}*({{ commit.scope }})* {% endif %}\
            {% if commit.breaking %}[**breaking**] {% endif %}\
            {{ commit.message | upper_first }}\
            {%- set closed = commit.footers | filter(attribute="token", value="closed") -%}
            {%- if closed | length > 0 %} \
                ({% for issue in closed
                    | map(attribute="value")
                    | join(sep=", ")
                    | split(pat=", ") %}\
                    [{{ issue }}](https://github.com/{{ remote.github.owner }}/{{ remote.github.repo }}/issues/{{ issue | trim_start_matches(pat="#") }})\
                    {% if not loop.last %}, {% endif %}\
                {% endfor %})\
            {%- endif -%}
    {% endfor %}
{% endfor %}
"""
trim = true
render_always = false

[git]
conventional_commits = true
filter_unconventional = true
require_conventional = false
split_commits = false

protect_breaking_commits = true

commit_parsers = [
    { message = "^feat", group = "<!-- 0 -->🚀 Features" },
    { message = "^fix", group = "<!-- 1 -->🐛 Bug Fixes" },
    { message = ".*", skip = true },
]

filter_commits = false
fail_on_unmatched_commit = false

link_parsers = []
use_branch_tags = false
topo_order = false
topo_order_commits = true
sort_commits = "oldest"
recurse_submodules = false
